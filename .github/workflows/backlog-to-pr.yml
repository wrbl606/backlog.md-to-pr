name: Backlog task to PR

on:
  workflow_dispatch:
    inputs:
      backlog_task_id:
        description: Backlog.md task ID, for example task-7
        required: true
        type: string
      provider:
        description: Coding CLI provider
        required: true
        default: codex
        type: choice
        options:
          - codex
          - opencode
      model:
        description: Optional provider model
        required: false
        type: string
      draft:
        description: Create the pull request as a draft
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  solve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run backlog-to-pr
        uses: ./
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          backlog-task-id: ${{ inputs.backlog_task_id }}
          provider: ${{ inputs.provider }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          codex-model: ${{ inputs.provider == 'codex' && inputs.model || '' }}
          opencode-model: ${{ inputs.provider == 'opencode' && inputs.model || '' }}
          opencode-go-subscription-key: ${{ secrets.OPENCODE_GO_SUBSCRIPTION_KEY }}
          draft: ${{ inputs.draft }}
